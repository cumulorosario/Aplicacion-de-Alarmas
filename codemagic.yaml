workflows:
  android-capacitor-workflow:
    name: Android Capacitor Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      java: 21
      groups:
        - google_play # Opcional: para credenciales si deseas publicar automáticamente
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web App
        script: npm run build
      - name: Capacitor Setup
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          # Habilitar tráfico HTTP (Cleartext) y Permisos de Notificación
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' 's/<application/<application android:usesCleartextTraffic="true"/g' android/app/src/main/AndroidManifest.xml
            sed -i '' 's/<\/manifest>/    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" \/>\n<\/manifest>/g' android/app/src/main/AndroidManifest.xml
          else
            sed -i 's/<application/<application android:usesCleartextTraffic="true"/g' android/app/src/main/AndroidManifest.xml
            sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" \/>\n<\/manifest>/g' android/app/src/main/AndroidManifest.xml
          fi
          npx cap sync android
      - name: Build Android Native
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug # Cambia a bundleRelease para producción final
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
      - android/app/build/outputs/bundle/**/*.aab
    publishing:
      email:
        recipients:
          - cumulorosario@gmail.com
