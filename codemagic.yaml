workflows:
  android-capacitor-workflow:
    name: Android Capacitor Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      groups:
        - google_play # Opcional: para credenciales si deseas publicar automáticamente
      vars:
        JAVA_HOME: /Library/Java/JavaVirtualMachines/temurin-21.jdk/Contents/Home
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web App
        script: npm run build
      - name: Capacitor Setup
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
      - name: Build Android Native
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug # Cambia a bundleRelease para producción final
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
      - android/app/build/outputs/bundle/**/*.aab
    publishing:
      email:
        recipients:
          - cumulorosario@gmail.com
